<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>كابتن مشوارك | نظام إدارة الطلبات المطور</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #5d3fd3; --s: #22c55e; --bg: #f0f2f5; --accent: #2563eb; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); direction: rtl; }
        
        .driver-header { background: var(--p); color: white; padding: 15px; border-radius: 0 0 20px 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .nav-tabs { display: flex; background: white; margin: 10px; border-radius: 12px; padding: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; font-weight: bold; cursor: pointer; border-radius: 10px; color: #666; transition: 0.3s; }
        .tab-btn.active { background: var(--p); color: white; }

        .order-card { background: white; border-radius: 15px; padding: 15px; margin: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-right: 6px solid var(--s); position: relative; animation: slideIn 0.3s ease; }
        .order-card.history { border-right-color: #94a3b8; opacity: 0.9; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .badge { padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        .badge-mishwar { background: #e0e7ff; color: #4338ca; }
        .badge-talab { background: #fef3c7; color: #d97706; }
        
        .info { font-size: 14px; margin: 8px 0; color: #333; display: flex; align-items: center; gap: 8px; }
        .info i { color: var(--p); width: 18px; text-align: center; }
        .price-tag { position: absolute; left: 15px; top: 15px; font-weight: bold; color: var(--s); font-size: 20px; }

        .btn-call { background: var(--accent); color: white; text-decoration: none; flex: 1; padding: 12px; border-radius: 10px; text-align: center; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-accept { background: var(--s); color: white; border: none; flex: 2; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-finish { background: #333; color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        #loginPage { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #eee; border-radius: 12px; text-align: center; font-size: 22px; outline: none; }
    </style>
</head>
<body>

<audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<div id="loginPage">
    <div class="login-card">
        <div style="font-size: 50px; color: var(--p);"><i class="fas fa-steering-wheel"></i></div>
        <h2 style="margin-top:10px;">دخول الكباتن</h2>
        <input type="password" id="dCode" placeholder="كودك السري" maxlength="4">
        <button class="btn-accept" style="width:100%; flex:none; background:var(--p);" onclick="login()">دخول الآن</button>
    </div>
</div>

<div id="mainPage" style="display:none;">
    <div class="driver-header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div>
                <b id="driverName" style="font-size:18px;">كابتن</b>
                <div id="dBalance" style="font-size: 13px; opacity: 0.9;">المديونية: 0.00 ج</div>
            </div>
            <button onclick="logout()" style="background:rgba(255,255,255,0.2); border:none; color:white; padding:6px 12px; border-radius:8px; font-size:12px;"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" id="tabOrders" onclick="switchTab('orders')">طلبات جديدة</button>
        <button class="tab-btn" id="tabHistory" onclick="switchTab('history')">سجل رحلاتي</button>
    </div>

    <div id="contentArea"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAsnynZvTRwXZyfcltKhagFW-tJM9zjuY8",
        authDomain: "zezo-44313.firebaseapp.com",
        projectId: "zezo-44313",
        databaseURL: "https://zezo-44313-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentDriver = null;
    let activeTab = 'orders';
    let lastOrderCount = 0;

    window.onload = function() {
        const saved = localStorage.getItem('activeDriver');
        if (saved) {
            currentDriver = JSON.parse(saved);
            showMain();
        }
    };

    function login() {
        const code = document.getElementById('dCode').value;
        db.ref('drivers').once('value', snap => {
            let found = null;
            snap.forEach(child => { if(child.val().password == code) found = child.val(); });
            if(found) {
                currentDriver = found;
                localStorage.setItem('activeDriver', JSON.stringify(found));
                showMain();
            } else { alert("الكود غير صحيح!"); }
        });
    }

    function showMain() {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('mainPage').style.display = 'block';
        document.getElementById('driverName').innerText = "أهلاً " + currentDriver.name;
        loadData();
    }

    function switchTab(tab) {
        activeTab = tab;
        document.getElementById('tabOrders').classList.toggle('active', tab === 'orders');
        document.getElementById('tabHistory').classList.toggle('active', tab === 'history');
        loadData();
    }

    function loadData() {
        db.ref('drivers/' + currentDriver.phone + '/commissionBalance').on('value', snap => {
            document.getElementById('dBalance').innerText = "المديونية: " + (snap.val() || 0).toFixed(2) + " ج";
        });

        db.ref('orders').on('value', snap => {
            const area = document.getElementById('contentArea');
            let html = '';
            let count = 0;
            let currentWaiting = 0;

            snap.forEach(child => {
                const o = child.val();
                if (o.status === 'waiting') currentWaiting++;
                
                if (activeTab === 'orders' && o.status === 'waiting') {
                    count++;
                    html += renderCard(child.key, o, false);
                } 
                else if (activeTab === 'history' && o.driverPhone === currentDriver.phone) {
                    count++;
                    html += renderCard(child.key, o, true);
                }
            });

            if (currentWaiting > lastOrderCount && activeTab === 'orders') {
                document.getElementById('notifSound').play().catch(()=>{});
            }
            lastOrderCount = currentWaiting;

            area.innerHTML = count > 0 ? html : `<div style="text-align:center; padding:60px; color:#999;"><p>مفيش طلبات حالياً</p></div>`;
        });
    }

    function renderCard(id, o, isHistory) {
        const badge = o.serviceType === 'مشوار' ? 'badge-mishwar' : 'badge-talab';
        return `
            <div class="order-card ${isHistory ? 'history' : ''}">
                <div class="price-tag">${o.price || 0} ج</div>
                <span class="badge ${badge}">${o.serviceType}</span>
                <div class="info"><i class="fas fa-map-marker-alt"></i> <b>من:</b> ${o.from}</div>
                <div class="info"><i class="fas fa-flag-checkered"></i> <b>إلى:</b> ${o.to || o.packageDescription}</div>
                <div class="info"><i class="fas fa-phone-alt"></i> <b>العميل:</b> ${o.customerPhone}</div>
                
                <div style="display:flex; gap:10px; margin-top:15px; flex-wrap:wrap;">
                    <a href="tel:${o.customerPhone}" class="btn-call"><i class="fas fa-phone-alt"></i> اتصال</a>
                    ${!isHistory ? `
                        <button class="btn-accept" onclick="acceptOrder('${id}', ${o.price || 0})">قبول المشوار ✅</button>
                    ` : (o.status === 'active' ? `
                        <button class="btn-finish" onclick="completeOrder('${id}')">إتمام التوصيل ✅</button>
                    ` : `<div style="flex:2; color:var(--s); font-weight:bold; text-align:center; padding:10px;">تم التوصيل بنجاح</div>`)}
                </div>
            </div>`;
    }

    function acceptOrder(id, price) {
        // 1. الفحص: هل السائق معاه طلب لسه مخلصش؟
        db.ref('orders').once('value').then(snap => {
            let hasActive = false;
            snap.forEach(child => {
                if(child.val().driverPhone === currentDriver.phone && child.val().status === 'active') hasActive = true;
            });

            if(hasActive) {
                alert("خلص المشوار اللي في إيدك الأول يا كابتن!");
                return;
            }

            // 2. فحص "خطف الطلب"
            db.ref('orders/' + id).once('value').then(snap => {
                if (snap.val().status !== 'waiting') {
                    alert("زميلك خطف الطلب ده قبلك!");
                    return;
                }

                if(!confirm("هتاخد المشوار ده؟")) return;
                db.ref('orders/' + id).update({
                    status: 'active',
                    driverName: currentDriver.name,
                    driverPhone: currentDriver.phone
                }).then(() => {
                    const commission = price * 0.20;
                    db.ref('drivers/' + currentDriver.phone + '/commissionBalance').transaction(c => (c || 0) + commission);
                    alert("تم القبول! المشوار في السجل الآن.");
                });
            });
        });
    }

    function completeOrder(id) {
        if(confirm("وصلت العميل بالسلامة؟")) {
            db.ref('orders/' + id).update({ status: 'completed' })
            .then(() => alert("عاش يا بطل! تقدر تاخد طلب جديد دلوقتي."));
        }
    }

    function logout() {
        if(confirm("عايز تخرج؟")) {
            localStorage.removeItem('activeDriver');
            location.reload();
        }
    }
</script>
</body>
</html>
